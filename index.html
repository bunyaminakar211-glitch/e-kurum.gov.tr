<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall v3.0 — Güvenli Video İletişim</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        /* ═══════════════════ RESET & TOKENS ═══════════════════ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg0:   #060b14;
            --bg1:   #0d1624;
            --bg2:   #111e30;
            --bg3:   #172540;
            --line:  #1e304d;
            --cyan:  #00d4ff;
            --cyan2: #0099cc;
            --green: #00e676;
            --red:   #ff3d57;
            --amber: #ffb300;
            --text:  #e0eaf5;
            --muted: #5a7a9a;
            --mono:  'JetBrains Mono', monospace;
            --sans:  'Syne', sans-serif;
            --radius: 14px;
            --glow:  0 0 20px rgba(0,212,255,.18);
        }

        body {
            font-family: var(--sans);
            background: var(--bg0);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Arka plan grid efekti */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ═══════════════════ HEADER ═══════════════════ */
        header {
            width: 100%;
            max-width: 1100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--line);
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: var(--sans);
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--cyan), #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .conn-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 12px;
            background: var(--bg2);
            border: 1px solid var(--line);
            padding: 6px 14px;
            border-radius: 100px;
        }

        /* Header ID Banner */
        .id-banner {
            width: 100%;
            background: linear-gradient(90deg, rgba(0,212,255,.08), rgba(124,58,237,.08));
            border-bottom: 1px solid rgba(0,212,255,.15);
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .id-banner-label {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .id-banner-value {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--cyan);
            letter-spacing: 1px;
            background: rgba(0,212,255,.07);
            border: 1px solid rgba(0,212,255,.2);
            padding: 5px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background .2s, border-color .2s;
            min-width: 180px;
            text-align: center;
        }
        .id-banner-value:hover {
            background: rgba(0,212,255,.14);
            border-color: var(--cyan);
        }

        .id-banner-copy {
            font-family: var(--mono);
            font-size: 11px;
            background: var(--bg3);
            border: 1px solid var(--line);
            color: var(--muted);
            padding: 5px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }
        .id-banner-copy:hover { color: var(--cyan); border-color: var(--cyan); }
        .id-banner-copy.copied { color: var(--green); border-color: var(--green); }

        .id-refresh-note {
            font-family: var(--mono);
            font-size: 10px;
            color: var(--muted);
            opacity: .6;
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--red);
            transition: background .3s;
        }
        .dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); }

        /* ═══════════════════ ANA LAYOUT ═══════════════════ */
        .main {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: 20px;
            padding: 20px 24px;
            position: relative;
            z-index: 1;
        }

        @media (max-width: 800px) {
            .main { grid-template-columns: 1fr; }
        }

        /* ═══════════════════ SOL PANEL ═══════════════════ */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--bg1);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 20px;
        }

        .card-title {
            font-size: 11px;
            font-family: var(--mono);
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 14px;
        }

        /* ID Kartı */
        .id-block {
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .id-text {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--cyan);
            word-break: break-all;
            flex: 1;
        }

        .copy-btn {
            background: var(--bg3);
            border: 1px solid var(--line);
            color: var(--muted);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: var(--mono);
            transition: all .2s;
            white-space: nowrap;
        }
        .copy-btn:hover { color: var(--cyan); border-color: var(--cyan); }
        .copy-btn.copied { color: var(--green); border-color: var(--green); }

        /* Input & Butonlar */
        .input-field {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 14px;
            font-family: var(--mono);
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }
        .input-field:focus { border-color: var(--cyan); }
        .input-field::placeholder { color: var(--muted); }
        .input-field.error { border-color: var(--red); }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-family: var(--sans);
            font-size: 14px;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary { background: var(--cyan); color: var(--bg0); width: 100%; margin-top: 10px; }
        .btn-primary:hover { background: var(--cyan2); transform: translateY(-1px); box-shadow: var(--glow); }
        .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-danger { background: var(--red); color: white; width: 100%; margin-top: 10px; display: none; }
        .btn-danger:hover { opacity: .85; }

        /* Medya Kontrolleri */
        .media-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 4px; }

        .ctrl-btn {
            background: var(--bg2);
            border: 1px solid var(--line);
            color: var(--text);
            padding: 12px 8px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--mono);
            transition: all .2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .ctrl-btn .icon { font-size: 20px; }
        .ctrl-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        .ctrl-btn.muted { background: rgba(255,61,87,.12); border-color: var(--red); color: var(--red); }
        .ctrl-btn.active-share { background: rgba(0,230,118,.12); border-color: var(--green); color: var(--green); }

        /* Chat Paneli */
        .chat-box {
            height: 180px;
            overflow-y: auto;
            background: var(--bg2);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

        .msg { padding: 6px 10px; border-radius: 8px; font-size: 13px; max-width: 90%; word-break: break-word; }
        .msg.me { background: var(--bg3); border: 1px solid var(--line); align-self: flex-end; }
        .msg.them { background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2); align-self: flex-start; }
        .msg.sys { color: var(--muted); font-family: var(--mono); font-size: 11px; text-align: center; align-self: center; }

        .chat-input-row { display: flex; gap: 8px; }
        .chat-input {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            padding: 9px 12px;
            font-size: 13px;
            outline: none;
            font-family: var(--sans);
        }
        .chat-input:focus { border-color: var(--cyan); }

        .send-btn {
            background: var(--cyan);
            border: none;
            border-radius: 8px;
            color: var(--bg0);
            padding: 9px 14px;
            cursor: pointer;
            font-size: 16px;
            transition: opacity .2s;
        }
        .send-btn:hover { opacity: .8; }
        .send-btn:disabled { opacity: .3; cursor: not-allowed; }

        /* ═══════════════════ VİDEO ALANI ═══════════════════ */
        .video-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        @media (max-width: 500px) {
            .video-grid { grid-template-columns: 1fr; }
        }

        .video-wrapper {
            position: relative;
            background: var(--bg1);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
        }

        .video-wrapper.active-call {
            border-color: var(--cyan);
            box-shadow: var(--glow);
        }

        video {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
        }

        #local-video { transform: scaleX(-1); }
        /* Remote video MIRROR OLMAMALI */
        #remote-video { transform: none; }

        .vid-label {
            position: absolute;
            bottom: 10px; left: 10px;
            background: rgba(6,11,20,.75);
            backdrop-filter: blur(8px);
            padding: 4px 12px;
            border-radius: 100px;
            font-size: 11px;
            font-family: var(--mono);
            color: var(--text);
            border: 1px solid var(--line);
        }

        /* Loading overlay — remote video beklenirken */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: opacity .4s;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--line);
            border-top-color: var(--cyan);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-overlay p { font-size: 13px; color: var(--muted); font-family: var(--mono); }

        /* No-cam placeholder */
        .no-cam {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--muted);
        }
        .no-cam .avatar { font-size: 48px; }
        .no-cam p { font-size: 12px; font-family: var(--mono); }

        /* ═══════════════════ GELEN ARAMA OVERLAY ═══════════════════ */
        #incoming-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6,11,20,.85);
            backdrop-filter: blur(12px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn .3s ease;
        }
        #incoming-overlay.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .incoming-card {
            background: var(--bg1);
            border: 1px solid var(--cyan);
            border-radius: 20px;
            padding: 36px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            box-shadow: var(--glow), 0 40px 80px rgba(0,0,0,.6);
            animation: slideUp .3s ease;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .ring-icon {
            font-size: 52px;
            animation: ring 1s ease infinite;
            display: inline-block;
        }
        @keyframes ring {
            0%,100% { transform: rotate(-10deg); }
            50%      { transform: rotate(10deg); }
        }

        .caller-id-text {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--cyan);
            background: var(--bg2);
            padding: 8px 14px;
            border-radius: 8px;
            margin: 14px 0;
            word-break: break-all;
        }

        .incoming-btns { display: flex; gap: 12px; justify-content: center; margin-top: 20px; }

        .btn-accept {
            background: var(--green); color: var(--bg0);
            border: none; border-radius: 50%;
            width: 60px; height: 60px;
            font-size: 22px; cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-accept:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(0,230,118,.4); }

        .btn-reject {
            background: var(--red); color: white;
            border: none; border-radius: 50%;
            width: 60px; height: 60px;
            font-size: 22px; cursor: pointer;
            transition: transform .2s, box-shadow .2s;
        }
        .btn-reject:hover { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,61,87,.4); }

        /* ═══════════════════ TOAST ═══════════════════ */
        #toast-area {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg2);
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 13px;
            font-family: var(--mono);
            white-space: nowrap;
            animation: toastIn .3s ease, toastOut .3s ease 2.7s forwards;
        }
        .toast.success { border-color: var(--green); color: var(--green); }
        .toast.error   { border-color: var(--red);   color: var(--red); }
        .toast.info    { border-color: var(--cyan);  color: var(--cyan); }

        @keyframes toastIn  { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

        /* ═══════════════════ SCROLL ═══════════════════ */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

<!-- ══════════════ TOAST ALANI ══════════════ -->
<div id="toast-area"></div>

<!-- ══════════════ GELEN ARAMA ══════════════ -->
<div id="incoming-overlay">
    <div class="incoming-card">
        <div class="ring-icon">📞</div>
        <h2 style="margin-top:12px; font-size:18px;">Gelen Arama</h2>
        <div class="caller-id-text" id="caller-id-text">—</div>
        <p style="color:var(--muted); font-size:13px;">sizi aramak istiyor</p>
        <div class="incoming-btns">
            <button class="btn-accept" onclick="answerCall()" title="Kabul Et">✓</button>
            <button class="btn-reject" onclick="declineCall()" title="Reddet">✕</button>
        </div>
    </div>
</div>

<!-- ══════════════ HEADER ══════════════ -->
<header>
    <div class="logo">NexCall</div>
    <div class="conn-badge">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">Bağlanıyor...</span>
    </div>
</header>

<!-- ══════════════ ID BANNER ══════════════ -->
<div class="id-banner">
    <span class="id-banner-label">Sizin ID'niz</span>
    <span class="id-banner-value" id="my-id-banner" onclick="copyBannerID()" title="Tıkla Kopyala">Bağlanıyor...</span>
    <button class="id-banner-copy" id="banner-copy-btn" onclick="copyBannerID()">📋 Kopyala</button>
    <span class="id-refresh-note">↻ Sayfayı yenileyince ID değişir</span>
</div>

<!-- ══════════════ ANA LAYOUT ══════════════ -->
<div class="main">

    <!-- SOL PANEL -->
    <div class="sidebar">

        <!-- Kimliğim -->
        <div class="card">
            <div class="card-title">Kimliğiniz</div>
            <div class="id-block">
                <span class="id-text" id="my-id">—</span>
                <button class="copy-btn" id="copy-btn" onclick="copyMyID()">Kopyala</button>
            </div>
        </div>

        <!-- Arama -->
        <div class="card">
            <div class="card-title">Bağlantı Kur</div>
            <input type="text" class="input-field" id="remote-id-input"
                placeholder="Karşı tarafın ID'si..."
                oninput="clearInputError()"
                onkeydown="if(event.key==='Enter') startCall
