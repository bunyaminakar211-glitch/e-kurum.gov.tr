<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexCall — Canlı Video Arama</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
body{margin:0;font-family:'DM Sans',sans-serif;background:#050c18;color:#ddeeff;display:flex;flex-direction:column;height:100vh;}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#0a1628;}
.logo{font-family:'Space Mono',monospace;font-weight:700;background:linear-gradient(100deg,#00c6ff,#0072ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.status-pill{display:flex;align-items:center;gap:5px;padding:3px 10px;background:#0f1e38;border-radius:100px;font-family:'Space Mono',monospace;font-size:12px;}
.dot{width:8px;height:8px;border-radius:50%;background:#ff3b5c;transition:all .3s;}
.dot.on{background:#00e676;}
.shell{flex:1;display:flex;overflow:hidden;}
.sidebar{width:320px;background:#0f1e38;display:flex;flex-direction:column;gap:15px;padding:15px;overflow-y:auto;}
.field{width:100%;padding:10px;border-radius:10px;border:1px solid #223650;background:#0f1e38;color:#ddeeff;}
.btn{padding:10px;border:none;border-radius:10px;color:#fff;cursor:pointer;margin-top:10px;}
.btn-call{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.btn-end{background:#ff3b5c;display:none;}
.video-side{flex:1;background:#050c18;display:flex;flex-direction:column;gap:10px;padding:10px;}
.vid-box{position:relative;background:#0a1628;border-radius:14px;overflow:hidden;aspect-ratio:16/9;}
video{width:100%;height:100%;object-fit:cover;}
.chat-msgs{flex:1;background:#0f1e38;border-radius:10px;padding:10px;overflow-y:auto;}
.chat-input{flex:1;padding:10px;border-radius:8px;border:1px solid #223650;background:#0f1e38;color:#ddeeff;}
.send{padding:10px;border:none;border-radius:8px;background:#00c6ff;color:#050c18;cursor:pointer;}
#call-overlay{position:fixed;inset:0;background:rgba(5,12,24,.9);backdrop-filter:blur(16px);display:none;align-items:center;justify-content:center;z-index:900;}
#call-overlay.show{display:flex;}
.call-card{background:#0f1e38;border-radius:24px;padding:40px 32px;text-align:center;}
.fab{width:64px;height:64px;border-radius:50%;border:none;cursor:pointer;font-size:24px;display:flex;align-items:center;justify-content:center;}
.fab-accept{background:#00e676;color:#050c18;margin-right:20px;}
.fab-reject{background:#ff3b5c;color:#fff;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">NexCall</div>
  <div class="status-pill"><div class="dot wait" id="dot"></div><span id="status-txt">Başlatılıyor...</span></div>
</div>

<div class="shell">
  <div class="sidebar">
    <input class="field" id="remote-id" placeholder="Karşı tarafın ID'si...">
    <button class="btn btn-call" id="call-btn">📹 Aramayı Başlat</button>
    <button class="btn btn-end" id="end-btn">📵 Görüşmeyi Bitir</button>
    <div style="flex:1;display:flex;flex-direction:column;margin-top:15px;">
      <div class="chat-msgs" id="chat-msgs"></div>
      <div style="display:flex;gap:5px;margin-top:5px;">
        <input class="chat-input" id="chat-inp" placeholder="Mesaj yaz..." disabled>
        <button class="send" id="send-btn" disabled>➤</button>
      </div>
    </div>
  </div>
  <div class="video-side">
    <div class="vid-box"><video id="local-video" autoplay muted></video></div>
    <div class="vid-box"><video id="remote-video" autoplay></video></div>
  </div>
</div>

<!-- Gelen Arama Overlay -->
<div id="call-overlay">
  <div class="call-card">
    <div style="font-size:56px;">📞</div>
    <h2>Gelen Arama</h2>
    <div id="caller-id" style="color:#00c6ff;margin:10px 0;">—</div>
    <div style="display:flex;justify-content:center;margin-top:20px;">
      <button class="fab fab-accept" id="accept-btn">✓</button>
      <button class="fab fab-reject" id="reject-btn">✕</button>
    </div>
  </div>
</div>

<script>
let localStream, currentCall, peer;
const localVideo=document.getElementById('local-video');
const remoteVideo=document.getElementById('remote-video');
const statusTxt=document.getElementById('status-txt');
const dot=document.getElementById('dot');
const callBtn=document.getElementById('call-btn');
const endBtn=document.getElementById('end-btn');
const remoteInput=document.getElementById('remote-id');
const chatInp=document.getElementById('chat-inp');
const sendBtn=document.getElementById('send-btn');
const chatMsgs=document.getElementById('chat-msgs');
const overlay=document.getElementById('call-overlay');
const callerIDLabel=document.getElementById('caller-id');
const acceptBtn=document.getElementById('accept-btn');
const rejectBtn=document.getElementById('reject-btn');

async function init(){
  try{
    localStream=await navigator.mediaDevices.getUserMedia({video:true,audio:true});
    localVideo.srcObject=localStream;
    statusTxt.textContent="Hazır"; dot.classList.remove('wait'); dot.classList.add('on');
  }catch(e){alert("Kamera/mikrofon açılamadı.");}

  peer=new Peer(undefined,{
    host:'peerjs-server.herokuapp.com', port:443, path:'/', secure:true
  });

  peer.on('open', id=>console.log("ID:",id));

  peer.on('call', call=>{
    overlay.classList.add('show'); callerIDLabel.textContent=call.peer;
    acceptBtn.onclick=()=>{ call.answer(localStream); setupCall(call); overlay.classList.remove('show'); };
    rejectBtn.onclick=()=>{ call.close(); overlay.classList.remove('show'); };
    currentCall=call;
  });
}

function startCall(){
  const remoteID=remoteInput.value.trim();
  if(!remoteID){alert("Lütfen ID girin!");return;}
  const call=peer.call(remoteID,localStream);
  setupCall(call);
}

function setupCall(call){
  currentCall=call;
  endBtn.style.display="block"; callBtn.style.display="none";
  chatInp.disabled=false; sendBtn.disabled=false;
  call.on('stream', stream=>remoteVideo.srcObject=stream);
  call.on('close', endCall);
}

function endCall(){
  if(currentCall){currentCall.close();currentCall=null;}
  remoteVideo.srcObject=null;
  endBtn.style.display="none"; callBtn.style.display="block";
  chatInp.disabled=true; sendBtn.disabled=true;
}

callBtn.onclick=startCall;
endBtn.onclick=endCall;

sendBtn.onclick=()=>{ const msg=chatInp.value.trim(); if(!msg) return; addChat(msg,'me'); chatInp.value=''; };

function addChat(msg,type){ const div=document.createElement('div'); div.className='msg '+type; div.textContent=msg; chatMsgs.appendChild(div); chatMsgs.scrollTop=chatMsgs.scrollHeight; }

init();
</script>
</body>
</html>
