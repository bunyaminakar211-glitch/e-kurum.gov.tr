<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCall v9 — Production Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
    <style>
        :root { --bg: #010409; --panel: #0d1117; --border: #30363d; --accent: #238636; --blue: #58a6ff; --red: #da3633; --text: #c9d1d9; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .app-shell { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: 0.3s; }
        
        .status-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 2px solid var(--border); }
        .status-pill { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 11px; letter-spacing: 0.5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #484f58; }
        .idle .dot { background: #8b949e; }
        .calling .dot { background: var(--blue); animation: pulse 1s infinite; }
        .active .dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .incoming .dot { background: #f1e05a; animation: blink 0.5s infinite; }
        
        @keyframes pulse { 50% { opacity: 0.2; } }
        @keyframes blink { 50% { opacity: 0; } }

        .viewport { display: none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .viewport.active { display: grid; }
        video { width: 100%; border-radius: 8px; background: #000; aspect-ratio: 16/9; object-fit: cover; border: 1px solid var(--border); }
        
        .btn { padding: 10px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; background: #21262d; color: var(--text); }
        .btn-primary { background: var(--accent); border: none; color: #fff; }
        .btn-danger { background: var(--red); border: none; color: #fff; }
        
        #terminal { height: 150px; overflow-y: auto; background: #010409; border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-family: 'SFMono-Regular', monospace; font-size: 11px; margin: 10px 0; color: #8b949e; }
        input { padding: 10px; border-radius: 6px; background:#0d1117; border:1px solid var(--border); color:#fff; font-size: 14px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div class="card status-header" id="state-container">
        <div class="status-pill idle" id="state-pill">
            <span class="dot"></span><span id="state-label">READY</span>
        </div>
        <div id="timer" style="font-family: monospace; font-weight: bold; color: var(--blue);">00:00</div>
    </div>

    <div class="card">
        <div style="font-size: 12px; margin-bottom: 8px; opacity: 0.7;">Your Secure ID: <strong id="peer-id-label" style="color: var(--blue);">...</strong></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="target-id" placeholder="Remote Peer ID" style="flex:1;">
            <button class="btn btn-primary" onclick="initiateOutbound()">CALL</button>
        </div>
    </div>

    <div class="card" id="media-panel" style="display:none;">
        <div class="viewport" id="v-grid">
            <video id="local-v" autoplay muted playsinline></video>
            <video id="remote-v" autoplay playsinline></video>
        </div>
        <div style="display:flex; justify-content:center; gap:10px; margin-top:15px;">
            <button class="btn" id="audio-btn" onclick="toggleMedia('audio')">🎤 MUTE</button>
            <button class="btn" id="video-btn" onclick="toggleMedia('video')">📷 CAMERA</button>
            <button class="btn btn-danger" onclick="hangup()">DISCONNECT</button>
        </div>
    </div>

    <div class="card">
        <div id="terminal"></div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="msg-input" placeholder="Type a message..." style="flex:1;" onkeypress="if(event.key==='Enter') sendText()">
            <button class="btn" onclick="sendText()">SEND</button>
        </div>
    </div>
</div>

<div id="modal-overlay" style="display:none; position:fixed; inset:0; background:rgba(1,4,9,0.92); align-items:center; justify-content:center; flex-direction:column; z-index:9999; backdrop-filter:blur(10px);">
    <h1 id="caller-id-modal" style="color:var(--blue); font-size: 2.5rem; margin-bottom:0;">...</h1>
    <p style="opacity:0.6; letter-spacing: 2px; margin-bottom:30px;">INCOMING ENCRYPTED CALL</p>
    <div style="display:flex; gap:20px;">
        <button class="btn btn-primary" style="padding:15px 45px; border-radius:30px; font-size:16px;" onclick="acceptCall()">ACCEPT</button>
        <button class="btn btn-danger" style="padding:15px 45px; border-radius:30px; font-size:16px;" onclick="rejectCall()">DECLINE</button>
    </div>
    <audio id="ring-audio" src="https://assets.mixkit.co/active_storage/sfx/1358/1358-preview.mp3" loop></audio>
</div>

<script>
    let peer, currentCall, dataConn, localStream;
    let timerRef, timeoutRef;
    let isMediaConnected = false;
    let isCaller = false; // 1. Deterministic Caller Tracking
    let appState = "idle"; 

    function initialize() {
        const id = crypto.randomUUID().slice(0, 6).toUpperCase();
        peer = new Peer(id, {
            config: { 'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
            ]}
        });

        peer.on('open', id => {
            document.getElementById('peer-id-label').textContent = id;
            updateUIState("idle", "READY");
        });

        peer.on('call', onCallReceived);
        peer.on('connection', onDataReceived);
        
        peer.on('disconnected', () => {
            log("Network lost. Attempting reconnection...");
            fullCleanup();
            peer.reconnect();
        });
        
        peer.on('error', e => log("System Error: " + e.type));
    }

    function updateUIState(state, label) {
        appState = state;
        const pill = document.getElementById('state-pill');
        pill.className = `status-pill ${state}`;
        document.getElementById('state-label').textContent = label;
    }

    // --- Media Core ---

    async function initiateOutbound() {
        const target = document.getElementById('target-id').value;
        if (!target || appState !== "idle") return;

        try {
            updateUIState("calling", "CONNECTING...");
            isCaller = true; // 1. Biz arıyoruz
            
            localStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user" }, audio: true 
            });
            
            document.getElementById('local-v').srcObject = localStream;
            document.getElementById('media-panel').style.display = "block";
            document.getElementById('v-grid').classList.add('active');

            const call = peer.call(target, localStream);
            setupCallListeners(call);

            timeoutRef = setTimeout(() => {
                if (!isMediaConnected) {
                    log("No response. Call timed out.");
                    hangup();
                }
            }, 25000);

        } catch (e) {
            log("Camera/Mic access denied.");
            fullCleanup();
        }
    }

    function onCallReceived(call) {
        if (appState !== "idle") { call.close(); return; }

        currentCall = call;
        isCaller = false; // 1. Biz aranan tarafız
        updateUIState("incoming", "INCOMING");
        document.getElementById('modal-overlay').style.display = "flex";
        document.getElementById('caller-id-modal').textContent = call.peer;
        
        document.getElementById('ring-audio').play().catch(()=>{});
        if(navigator.vibrate) navigator.vibrate([400, 200, 400]);
    }

    async function acceptCall() {
        if (appState !== "incoming") return;
        
        stopSignals();
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('local-v').srcObject = localStream;
            document.getElementById('media-panel').style.display = "block";
            document.getElementById('v-grid').classList.add('active');
            
            currentCall.answer(localStream);
            setupCallListeners(currentCall);
        } catch (e) { hangup(); }
    }

    function rejectCall() {
        if (currentCall) currentCall.close();
        fullCleanup();
    }

    function setupCallListeners(call) {
        currentCall = call;
        isMediaConnected = false;

        call.on('stream', stream => {
            isMediaConnected = true;
            clearTimeout(timeoutRef);
            
            const rVid = document.getElementById('remote-v');
            rVid.srcObject = stream;
            rVid.muted = false; // 4. Audio route fix
            rVid.play().catch(() => log("Remote audio autoplay blocked."));

            updateUIState("active", "ON CALL");
            startTimer();

            // 1. & 2. Sadece Caller, Retry mekanizması ile data channel açar
            if (isCaller && appState === "active") {
                establishDataChannel(call.peer);
            }
        });

        call.on('close', () => {
            log("Call session ended.");
            fullCleanup();
        });
    }

    // --- Data Core ---

    // 2. PRO FIX: Retry Logic for Data Channel
    function establishDataChannel(peerId, attempts = 3) {
        if (attempts === 0 || !isCaller) return;
        
        log(`Establishing data channel (Attempts left: ${attempts})...`);
        const conn = peer.connect(peerId);
        
        let connectionTimer = setTimeout(() => {
            if (!conn.open) {
                conn.close();
                establishDataChannel(peerId, attempts - 1);
            }
        }, 3000);

        conn.on('open', () => {
            clearTimeout(connectionTimer);
            setupDataHandlers(conn);
        });
    }

    function onDataReceived(conn) {
        if (dataConn) dataConn.close();
        setupDataHandlers(conn);
    }

    function setupDataHandlers(conn) {
        dataConn = conn;
        dataConn.on('open', () => log("Data link secured."));
        dataConn.on('data', d => {
            if (d.type === "CHAT") log(`${conn.peer}: ${d.val}`);
        });
        dataConn.on('close', () => log("Data link lost."));
    }

    function sendText() {
        const input = document.getElementById('msg-input');
        if (!input.value || !dataConn || !dataConn.open) return;
        
        dataConn.send({ type: "CHAT", val: input.value });
        log(`Me: ${input.value}`);
        input.value = "";
    }

    // --- Cleaners ---

    function toggleMedia(type) {
        if (!localStream) return;
        const track = type === 'audio' ? localStream.getAudioTracks()[0] : localStream.getVideoTracks()[0];
        if (track) {
            track.enabled = !track.enabled;
            document.getElementById(`${type}-btn`).textContent = track.enabled ? 
                (type === 'audio' ? "🎤 MUTE" : "📷 CAMERA") : 
                (type === 'audio' ? "🔇 UNMUTE" : "📷 START VIDEO");
        }
    }

    function fullCleanup() {
        if (localStream) {
            localStream.getTracks().forEach(t => t.stop());
            localStream = null;
        }
        
        isMediaConnected = false;
        isCaller = false;
        clearTimeout(timeoutRef);
        clearInterval(timerRef);
        
        document.getElementById('media-panel').style.display = "none";
        document.getElementById('modal-overlay').style.display = "none";
        document.getElementById('timer').textContent = "00:00";
        document.getElementById('v-grid').classList.remove('active');
        
        document.getElementById('audio-btn').textContent = "🎤 MUTE";
        document.getElementById('video-btn').textContent = "📷 CAMERA";
        
        if (currentCall) currentCall.close();
        if (dataConn) dataConn.close();
        
        currentCall = null;
        dataConn = null;
        updateUIState("idle", "READY");
        stopSignals();
    }

    function hangup() {
        fullCleanup();
    }

    // --- Tools ---

    function startTimer() {
        clearInterval(timerRef);
        let s = 0;
        timerRef = setInterval(() => {
            s++;
            const m = Math.floor(s/60).toString().padStart(2,'0');
            const sec = (s%60).toString().padStart(2,'0');
            document.getElementById('timer').textContent = `${m}:${sec}`;
        }, 1000);
    }

    function log(m) {
        const t = document.getElementById('terminal');
        const d = document.createElement('div');
        d.textContent = `> ${m}`;
        t.appendChild(d);
        t.scrollTop = t.scrollHeight;
    }

    function stopSignals() {
        const a = document.getElementById('ring-audio');
        a.pause(); a.currentTime = 0;
        if(navigator.vibrate) navigator.vibrate(0);
    }

    initialize();
</script>
</body>
</html>
